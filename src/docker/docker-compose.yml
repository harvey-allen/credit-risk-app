services:
  web:
    container_name: credit-risk-api
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ..:/app
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      - db

  db:
    container_name: credit-risk-db
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  lint:
    container_name: credit-risk-lint
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: bash scripts/lint.sh
    volumes:
      - ..:/app
    environment:
      - PYTHONUNBUFFERED=1

  unit-test:
    container_name: credit-risk-test
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: bash scripts/test.sh
    volumes:
      - ..:/app
    environment:
      - PYTHONUNBUFFERED=1

  localstack:
    container_name: aws-localstack
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - SERVICES=ecr,ecs,iam
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"

volumes:
  postgres_data:
